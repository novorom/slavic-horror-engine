name: Daily Horror Reel Upload

on:
  schedule:
    # Run every day at 9 PM Madrid time (7 PM UTC in summer, 8 PM UTC in winter)
    - cron: '0 19 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Clear cache
        run: |
          rm -rf cache/*
      
      - name: Generate video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py
      
      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          # Read metadata from generated files
          TITLE=$(cat output/youtube.txt | head -1)
          DESCRIPTION=$(cat output/youtube.txt | tail -n +2)
          
          # Upload video
          python youtube_uploader.py \
            output/video.mp4 \
            "$TITLE" \
            "$DESCRIPTION"
      
      - name: Publish to Instagram and TikTok
        env:
          INDREELFORGE_API_KEY: ${{ secrets.INDREELFORGE_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          python social_publisher.py
