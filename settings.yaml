project:
  name: "Slavic Horror Engine v2"
  language: "Spanish"
  timezone: "Europe/Madrid"

paths:
  assets: "assets"
  cache: "cache"
  output: "output"
  logs: "logs"
  music: "assets/music"
  fonts: "assets/fonts"

providers:
  story: "gemini"
  image: "pollinations"
  tts: "gtts"

gemini:
  model: "gemini-2.5-flash"
  api_key_envs:
    - "GEMINI_API_KEYS"
    - "GEMINI_API_KEY_1"
    - "GEMINI_API_KEY_2"
    - "GEMINI_API_KEY_3"
    - "GEMINI_API_KEY"
  temperature: 0.9
  max_retries: 3

pollinations:
  base_url: "https://image.pollinations.ai/prompt"
  model: "flux"
  width: 1080
  height: 1920
  enhance: true
  safe: false
  nologo: true
  timeout_seconds: 90
  max_retries: 3

video:
  width: 1080
  height: 1920
  fps: 30
  horizontal_stretch: 1.0
  codec: "libx264"
  audio_codec: "aac"
  preset: "medium"
  crf: 20
  scene_duration_seconds: 5.5
  fallback_duration_seconds: 4.8
  min_total_seconds: 45
  max_total_seconds: 50

story:
  scene_count: 8
  min_words_per_scene: 5
  max_words_per_scene: 12
  monsters:
    - "Baba Yaga"
    - "Koschei"
    - "Leshy"
    - "Zmey Gorynych"
    - "Rusalka"
    - "Domovoy"
    - "Vodyanoy"
    - "Kikimora"
    - "Viy"
    - "Upyr"
    - "Likho"
    - "Poludnitsa"
    - "Bannik"
    - "Firebird"
    - "Chort"
    - "Strzyga"
    - "Werewolves"
    - "Vila"
    - "Drekavac"
    - "Solovey-Razboynik"
    - "Azhdaya"
    - "Aspid"
    - "Bolotnik"
    - "Sirin"
    - "Gamayun"
    - "Alkanost"
    - "Balachko"
    - "Bauk"
    - "Bukavac"
    - "Chuma"
    - "Polewnik"
    - "Poroniec"
    - "Midnight Bride"
    - "Lady Midday"
    - "Ala"
    - "Mavka"
    - "Nocnitsa"
    - "Zirnitra"

audio:
  voice: "es-ES-ElviraNeural"
  rate: "-5%"
  pitch: "-10Hz"
  volume: "+0%"
  macos_voice: "Elvira (Испанский (Испания))"
  voice_profile: "natural"
  voice_lowpass_hz: 3800
  voice_highpass_hz: 50
  music_volume: 0.12
  voice_ducking_floor: 0.08
  voice_ducking_rise: 0.75
  accent_volume: 0.28
  accent_tail_seconds: 2.0
  whisper_volume: 0.18
  whisper_tail_seconds: 2.2
  final_accent_multiplier: 1.85
  final_whisper_multiplier: 1.5
  final_accent_tail_seconds: 3.2
  final_whisper_tail_seconds: 3.6
  final_stinger_tail_seconds: 2.8
  final_stinger_gap_seconds: 0.08
  final_stinger_volume: 0.42
  ambient_base_hz: 43.0
  voice_volume: 1.0
  fallback_silence: true

subtitles:
  font_file: ""
  font_size: 80
  max_chars_per_line: 24
  bottom_margin: 260
  text_color: "#BCA37A"
  stroke_color: "#090706"
  stroke_width: 5
  box_opacity: 170

watermark:
  enabled: true
  position: "bottom_right"
  opacity: 0.7
  size: 0.08
  horror_color: "#8B0000"

logging:
  level: "INFO"
  file: "render.log"
